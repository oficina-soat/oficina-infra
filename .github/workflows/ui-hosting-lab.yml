name: UI Hosting Lab

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Ação Terraform da hospedagem opcional"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

concurrency:
  group: ui-hosting-lab
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: -no-color
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  TF_VAR_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  UI_CONNECT_SRC_ORIGINS_OVERRIDE: ${{ vars.UI_CONNECT_SRC_ORIGINS }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: terraform/optional/ui-hosting/lab
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Resolve backend configuration
        id: backend
        working-directory: .
        shell: bash
        run: |
          ./scripts/actions/resolve-terraform-backend.sh >> "${GITHUB_OUTPUT}"

      - name: Resolve default API origin
        working-directory: terraform/environments/lab
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/infra/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"
          endpoint="$(terraform output -raw api_gateway_endpoint)"
          if [[ -z "${endpoint}" || "${endpoint}" == null ]]; then
            echo "O state principal não possui api_gateway_endpoint." >&2
            exit 1
          fi
          origins="${UI_CONNECT_SRC_ORIGINS_OVERRIDE:-$(jq -cn --arg origin "${endpoint%/}" '[$origin]')}"
          echo "TF_VAR_connect_src_origins=${origins}" >> "${GITHUB_ENV}"

      - name: Terraform init
        env:
          RESOLVED_TF_STATE_BUCKET: ${{ steps.backend.outputs.bucket }}
          RESOLVED_TF_STATE_REGION: ${{ steps.backend.outputs.region }}
          RESOLVED_TF_STATE_DYNAMODB_TABLE: ${{ steps.backend.outputs.dynamodb_table }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            "-backend-config=bucket=${RESOLVED_TF_STATE_BUCKET}"
            "-backend-config=key=oficina/lab/optional/ui-hosting/terraform.tfstate"
            "-backend-config=region=${RESOLVED_TF_STATE_REGION}"
          )
          if [[ -n "${RESOLVED_TF_STATE_DYNAMODB_TABLE:-}" ]]; then
            args+=("-backend-config=dynamodb_table=${RESOLVED_TF_STATE_DYNAMODB_TABLE}")
          fi
          terraform init -input=false "${args[@]}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: inputs.action != 'destroy'
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: inputs.action == 'apply'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform destroy
        if: inputs.action == 'destroy'
        run: terraform destroy -input=false -auto-approve

      - name: Publish stack outputs
        if: inputs.action == 'apply'
        shell: bash
        run: |
          {
            echo "### UI Hosting Lab"
            echo
            echo "- URL: $(terraform output -raw ui_url)"
            echo "- Distribution: $(terraform output -raw cloudfront_distribution_id)"
            echo "- Bucket: $(terraform output -raw bucket_name)"
          } >> "${GITHUB_STEP_SUMMARY}"
