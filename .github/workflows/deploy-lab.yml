name: Deploy Lab

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      start_rds:
        description: "Inicia o RDS antes de retomar o deploy"
        required: false
        type: boolean
        default: false

concurrency:
  group: lab-infra
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_CLI_ARGS: -no-color
      MICROSERVICE_REPOSITORIES_ROOT: ${{ github.workspace }}/service-sources
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout oficina-os-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-os-service
          path: service-sources/oficina-os-service

      - name: Checkout oficina-billing-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-billing-service
          path: service-sources/oficina-billing-service

      - name: Checkout oficina-execution-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-execution-service
          path: service-sources/oficina-execution-service

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.47.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Validate repository
        shell: bash
        run: bash ./scripts/actions/validate.sh

  deploy:
    needs: validate
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_ARGS: -no-color
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/infra/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      BOOTSTRAP_TF_STATE_BUCKET: ${{ vars.BOOTSTRAP_TF_STATE_BUCKET || 'true' }}
      TF_VAR_create_network_if_missing: ${{ vars.CREATE_NETWORK_IF_MISSING || 'true' }}
      TF_VAR_vpc_id: ${{ vars.VPC_ID }}
      TF_VAR_subnet_ids: ${{ vars.SUBNET_IDS || '[]' }}
      TF_VAR_allowed_security_group_ids: ${{ vars.RDS_ALLOWED_SECURITY_GROUP_IDS || '[]' }}
      TF_VAR_allowed_cidr_blocks: ${{ vars.RDS_ALLOWED_CIDR_BLOCKS || '[]' }}
      TF_VAR_deletion_protection: ${{ vars.RDS_DELETION_PROTECTION || 'false' }}
      TF_VAR_skip_final_snapshot: ${{ vars.SKIP_FINAL_SNAPSHOT || 'true' }}
      TF_VAR_delete_automated_backups: ${{ vars.DELETE_AUTOMATED_BACKUPS || 'true' }}
      TF_VAR_final_snapshot_identifier: ${{ vars.FINAL_SNAPSHOT_IDENTIFIER }}
      TF_VAR_create_eks: ${{ vars.CREATE_EKS || 'true' }}
      TF_VAR_eks_cluster_role_arn: ${{ vars.EKS_CLUSTER_ROLE_ARN }}
      TF_VAR_eks_node_role_arn: ${{ vars.EKS_NODE_ROLE_ARN }}
      TF_VAR_eks_access_principal_arn: ${{ vars.EKS_ACCESS_PRINCIPAL_ARN }}
      TF_VAR_create_terraform_shared_data_bucket: ${{ vars.CREATE_TERRAFORM_SHARED_DATA_BUCKET || 'false' }}
      TF_VAR_create_execution_dynamodb: ${{ vars.CREATE_EXECUTION_DYNAMODB || 'true' }}
      TF_VAR_execution_dynamodb_table_prefix: ${{ vars.EXECUTION_DYNAMODB_TABLE_PREFIX }}
      TF_VAR_execution_dynamodb_point_in_time_recovery_enabled: ${{ vars.EXECUTION_DYNAMODB_POINT_IN_TIME_RECOVERY_ENABLED || 'false' }}
      TF_VAR_execution_dynamodb_deletion_protection_enabled: ${{ vars.EXECUTION_DYNAMODB_DELETION_PROTECTION_ENABLED || 'false' }}
      TF_VAR_execution_dynamodb_kms_key_arn: ${{ vars.EXECUTION_DYNAMODB_KMS_KEY_ARN }}
      TF_VAR_create_domain_messaging: ${{ vars.CREATE_DOMAIN_MESSAGING || 'true' }}
      TF_VAR_create_runtime_iam_policies: ${{ vars.CREATE_RUNTIME_IAM_POLICIES || 'true' }}
      TF_VAR_attach_auth_sync_lambda_consumer_policy: ${{ vars.ATTACH_AUTH_SYNC_LAMBDA_CONSUMER_POLICY || 'false' }}
      TF_VAR_auth_sync_lambda_role_name: ${{ vars.AUTH_SYNC_LAMBDA_ROLE_NAME || vars.AUTH_LAMBDA_ROLE_NAME || vars.LAMBDA_ROLE_NAME || 'LabRole' }}
      TF_VAR_domain_messaging_raw_message_delivery: ${{ vars.DOMAIN_MESSAGING_RAW_MESSAGE_DELIVERY || 'true' }}
      TF_VAR_domain_messaging_sns_kms_master_key_id: ${{ vars.DOMAIN_MESSAGING_SNS_KMS_MASTER_KEY_ID }}
      BOOTSTRAP_SERVICE_DATABASES: ${{ vars.BOOTSTRAP_SERVICE_DATABASES || 'true' }}
      BOOTSTRAP_SERVICE_DATABASES_MODE: ${{ vars.BOOTSTRAP_SERVICE_DATABASES_MODE || 'k8s' }}
      DB_BOOTSTRAP_NAMESPACE: ${{ vars.DB_BOOTSTRAP_NAMESPACE || 'default' }}
      DB_BOOTSTRAP_IMAGE: ${{ vars.DB_BOOTSTRAP_IMAGE || 'postgres:16' }}
      DB_BOOTSTRAP_TIMEOUT: ${{ vars.DB_BOOTSTRAP_TIMEOUT || '300s' }}
      APPLY_K8S: ${{ vars.APPLY_K8S || 'true' }}
      APPLY_MICROSERVICES: ${{ vars.APPLY_MICROSERVICES || 'true' }}
      OFICINA_OS_SERVICE_IMAGE: ${{ vars.OFICINA_OS_SERVICE_IMAGE }}
      OFICINA_BILLING_SERVICE_IMAGE: ${{ vars.OFICINA_BILLING_SERVICE_IMAGE }}
      OFICINA_EXECUTION_SERVICE_IMAGE: ${{ vars.OFICINA_EXECUTION_SERVICE_IMAGE }}
      OFICINA_AUTH_ISSUER: ${{ vars.OFICINA_AUTH_ISSUER }}
      OFICINA_AUTH_JWKS_URI: ${{ vars.OFICINA_AUTH_JWKS_URI }}
      OFICINA_MERCADO_PAGO_ENABLED: ${{ vars.OFICINA_MERCADO_PAGO_ENABLED }}
      OFICINA_MERCADO_PAGO_ACCESS_TOKEN: ${{ secrets.OFICINA_MERCADO_PAGO_ACCESS_TOKEN }}
      OFICINA_MERCADO_PAGO_WEBHOOK_SECRET: ${{ secrets.OFICINA_MERCADO_PAGO_WEBHOOK_SECRET }}
      OFICINA_MERCADO_PAGO_API_URL: ${{ vars.OFICINA_MERCADO_PAGO_API_URL }}
      OFICINA_MERCADO_PAGO_PAYER_EMAIL: ${{ vars.OFICINA_MERCADO_PAGO_PAYER_EMAIL }}
      BILLING_MERCADO_PAGO_K8S_SECRET_NAME: ${{ vars.BILLING_MERCADO_PAGO_K8S_SECRET_NAME || 'oficina-billing-service-mercado-pago-env' }}
      JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME || 'oficina/lab/jwt' }}
      JWT_SECRET_PUBLIC_KEY_FIELD: ${{ vars.JWT_SECRET_PUBLIC_KEY_FIELD || 'publicKeyPem' }}
      K8S_JWT_SECRET_NAME: ${{ vars.K8S_JWT_SECRET_NAME || 'oficina-jwt-keys' }}
      WAIT_MICROSERVICE_ROLLOUT: ${{ vars.WAIT_MICROSERVICE_ROLLOUT || 'false' }}
      MICROSERVICE_ROLLOUT_TIMEOUT: ${{ vars.MICROSERVICE_ROLLOUT_TIMEOUT || '300s' }}
      MICROSERVICE_REPOSITORIES_ROOT: ${{ github.workspace }}/service-sources
      INSTALL_NEW_RELIC_OTEL_COLLECTOR: ${{ vars.INSTALL_NEW_RELIC_OTEL_COLLECTOR || 'auto' }}
      NEW_RELIC_LICENSE_KEY: ${{ secrets.NEW_RELIC_LICENSE_KEY }}
      NEW_RELIC_NAMESPACE: ${{ vars.NEW_RELIC_NAMESPACE || 'newrelic' }}
      NEW_RELIC_OTEL_COLLECTOR_HELM_RELEASE: ${{ vars.NEW_RELIC_OTEL_COLLECTOR_HELM_RELEASE || 'nr-k8s-otel-collector' }}
      NEW_RELIC_OTEL_COLLECTOR_LOCAL_SERVICE_NAME: ${{ vars.NEW_RELIC_OTEL_COLLECTOR_LOCAL_SERVICE_NAME || 'nr-k8s-otel-collector-gateway' }}
      NEW_RELIC_LICENSE_KEY_SECRET_NAME: ${{ vars.NEW_RELIC_LICENSE_KEY_SECRET_NAME || 'new-relic-license-key' }}
      NEW_RELIC_LICENSE_KEY_SECRET_KEY: ${{ vars.NEW_RELIC_LICENSE_KEY_SECRET_KEY || 'licenseKey' }}
      NEW_RELIC_CLUSTER_NAME: ${{ vars.NEW_RELIC_CLUSTER_NAME || vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      NEW_RELIC_REGION: ${{ vars.NEW_RELIC_REGION || 'US' }}
      NEW_RELIC_OTLP_ENDPOINT: ${{ vars.NEW_RELIC_OTLP_ENDPOINT || 'https://otlp.nr-data.net' }}
      UPSERT_NEW_RELIC_SECRET: ${{ vars.UPSERT_NEW_RELIC_SECRET || 'true' }}
      START_RDS_ON_DEPLOY: ${{ inputs.start_rds || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout oficina-os-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-os-service
          path: service-sources/oficina-os-service

      - name: Checkout oficina-billing-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-billing-service
          path: service-sources/oficina-billing-service

      - name: Checkout oficina-execution-service manifests
        uses: actions/checkout@v6
        with:
          repository: oficina-soat/oficina-execution-service
          path: service-sources/oficina-execution-service

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        if: env.INSTALL_NEW_RELIC_OTEL_COLLECTOR != 'false'
        uses: azure/setup-helm@v5

      - name: Validate New Relic configuration
        shell: bash
        run: |
          set -euo pipefail

          install_mode="${INSTALL_NEW_RELIC_OTEL_COLLECTOR,,}"
          upsert_secret="${UPSERT_NEW_RELIC_SECRET,,}"

          case "${install_mode}" in
            auto)
              if [[ -n "${NEW_RELIC_LICENSE_KEY:-}" ]]; then
                echo "New Relic collector will be installed because NEW_RELIC_LICENSE_KEY is configured."
              else
                echo "New Relic collector will be skipped because NEW_RELIC_LICENSE_KEY is not configured."
              fi
              ;;
            true|1|yes|y)
              if [[ "${upsert_secret}" == "true" && -z "${NEW_RELIC_LICENSE_KEY:-}" ]]; then
                echo "NEW_RELIC_LICENSE_KEY must be configured when INSTALL_NEW_RELIC_OTEL_COLLECTOR=true." >&2
                exit 1
              fi
              ;;
            false|0|no|n)
              echo "New Relic collector disabled by INSTALL_NEW_RELIC_OTEL_COLLECTOR=false."
              ;;
            *)
              echo "INSTALL_NEW_RELIC_OTEL_COLLECTOR must be true, false or auto." >&2
              exit 1
              ;;
          esac

      - name: Deploy lab infrastructure
        shell: bash
        run: bash ./scripts/actions/ci-deploy.sh
