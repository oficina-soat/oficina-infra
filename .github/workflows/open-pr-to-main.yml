name: Open PR To Main

on:
  push:
    branches:
      - develop

concurrency:
  group: open-pr-to-main-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_CLI_ARGS: -no-color
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Validate repository
        shell: bash
        run: bash ./scripts/actions/validate.sh

  open-pull-request-to-main:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Open or update pull request to main
        shell: bash
        env:
          BASE_BRANCH: main
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          existing_pr_number="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${BASE_BRANCH}" \
              --head "${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          title="chore: promover ${HEAD_BRANCH} para ${BASE_BRANCH}"
          body="$(printf '%s\n\n%s\n%s\n%s\n' \
            "PR automático preparado após validações de infraestrutura." \
            "- Branch origem: ${HEAD_BRANCH}" \
            "- Branch destino: ${BASE_BRANCH}" \
            "- Commit validado: ${GITHUB_SHA}")"

          if [[ -n "${existing_pr_number}" ]]; then
            gh pr edit "${existing_pr_number}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
            exit 0
          fi

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${BASE_BRANCH}" \
            --head "${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" \
            --title "${title}" \
            --body "${body}"
