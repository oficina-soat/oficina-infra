name: Destroy Lab

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Digite DESTROY para confirmar a remoção da infraestrutura do lab"
        required: true
        type: string

concurrency:
  group: lab-infra
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  destroy:
    if: inputs.confirm_destroy == 'DESTROY'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_ARGS: -no-color
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || 'eks-lab' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'oficina/lab/infra/terraform.tfstate' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || vars.AWS_REGION || 'us-east-1' }}
      TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
      BOOTSTRAP_TF_STATE_BUCKET: ${{ vars.BOOTSTRAP_TF_STATE_BUCKET || 'true' }}
      TF_VAR_create_eks: ${{ vars.CREATE_EKS || 'true' }}
      TF_VAR_eks_cluster_role_arn: ${{ vars.EKS_CLUSTER_ROLE_ARN }}
      TF_VAR_eks_node_role_arn: ${{ vars.EKS_NODE_ROLE_ARN }}
      TF_VAR_eks_access_principal_arn: ${{ vars.EKS_ACCESS_PRINCIPAL_ARN }}
      TF_VAR_deletion_protection: "false"
      TF_VAR_skip_final_snapshot: "true"
      TF_VAR_delete_automated_backups: "true"
      TF_VAR_final_snapshot_identifier: ""
      TF_VAR_ecr_force_delete: "true"
      DESTROY_ECR_IMAGES: ${{ vars.DESTROY_ECR_IMAGES || 'true' }}
      DESTROY_ECR_REPOSITORY_NAMES: ${{ vars.DESTROY_ECR_REPOSITORY_NAMES }}
      DESTROY_EXTERNAL_LAMBDAS: ${{ vars.DESTROY_EXTERNAL_LAMBDAS || 'true' }}
      DESTROY_LAMBDA_FUNCTION_NAMES: ${{ vars.DESTROY_LAMBDA_FUNCTION_NAMES }}
      DESTROY_LAMBDA_ENI_WAIT_SECONDS: ${{ vars.DESTROY_LAMBDA_ENI_WAIT_SECONDS || '600' }}
      DESTROY_LAMBDA_ENI_POLL_SECONDS: ${{ vars.DESTROY_LAMBDA_ENI_POLL_SECONDS || '15' }}
      AUTH_LAMBDA_FUNCTION_NAME: ${{ vars.AUTH_LAMBDA_FUNCTION_NAME || 'oficina-auth-lambda-lab' }}
      AUTH_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.AUTH_LAMBDA_SECURITY_GROUP_NAME }}
      NOTIFICACAO_LAMBDA_FUNCTION_NAME: ${{ vars.NOTIFICACAO_LAMBDA_FUNCTION_NAME || 'oficina-notificacao-lambda-lab' }}
      NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME: ${{ vars.NOTIFICACAO_LAMBDA_SECURITY_GROUP_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Destroy lab infrastructure
        shell: bash
        run: TERRAFORM_ACTION=destroy bash ./scripts/actions/ci-terraform.sh
